name: Notify Discord Release
description: Send a standardized Discord notification after GitHub Release publish/update

inputs:
  webhook:
    description: Discord webhook URL
    required: false
  tag:
    description: Release tag (e.g. v1.2.3 or v1.2.3-pre)
    required: true
  workflow_ref:
    description: Branch or ref for workflow status link
    required: false
    default: workflow
  homepage_url:
    description: Homepage URL for download section
    required: false
    default: https://astral.maynutlab.com/
  autopatcher_url:
    description: Direct download URL for auto patcher program
    required: false
    default: https://astral.maynutlab.com/
  autopatch_page_url:
    description: Auto patch guide page URL
    required: false
    default: https://astral.maynutlab.com/autopatch
  changelog_url:
    description: Changelog page URL
    required: false
    default: https://astral.maynutlab.com/editor/changelog

runs:
  using: composite
  steps:
    - name: Send Discord notification
      shell: bash
      env:
        DISCORD_WEBHOOK: ${{ inputs.webhook }}
        TAG: ${{ inputs.tag }}
        WORKFLOW_REF: ${{ inputs.workflow_ref }}
        HOMEPAGE_URL: ${{ inputs.homepage_url }}
        AUTOPATCHER_URL: ${{ inputs.autopatcher_url }}
        AUTOPATCH_PAGE_URL: ${{ inputs.autopatch_page_url }}
        CHANGELOG_URL: ${{ inputs.changelog_url }}
      run: |
        set -euo pipefail

        if [ -z "${DISCORD_WEBHOOK:-}" ]; then
          echo "DISCORD_WEBHOOK is not configured; skipping Discord notification."
          exit 0
        fi

        RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
        WORKFLOW_TREE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${WORKFLOW_REF}"
        TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"

        EMBED_DESCRIPTION="## ${TAG}"
        if [[ "${TAG}" == *"-pre"* ]]; then
          EMBED_DESCRIPTION="${EMBED_DESCRIPTION}"$'\n'"⚠ Pre-release 버전에서는 일부 번역되지 않은 요소가 존재할 수 있습니다."
        fi

        PAYLOAD="$(jq -n \
          --arg tag "${TAG}" \
          --arg release_url "${RELEASE_URL}" \
          --arg workflow_tree_url "${WORKFLOW_TREE_URL}" \
          --arg autopatcher_url "${AUTOPATCHER_URL}" \
          --arg autopatch_page_url "${AUTOPATCH_PAGE_URL}" \
          --arg homepage_url "${HOMEPAGE_URL}" \
          --arg changelog_url "${CHANGELOG_URL}" \
          --arg timestamp "${TIMESTAMP}" \
          --arg description "${EMBED_DESCRIPTION}" \
          '{
            content: "🔔 새로운 버전이 등록되었습니다!",
            embeds: [
              {
                description: $description,
                color: 15531954,
                fields: [
                  {
                    name: "다운로드",
                    value: ("[홈페이지](" + $homepage_url + ")")
                  },
                  {
                    name: "자동 패치",
                    value: (
                      "[프로그램 다운로드](" + $autopatcher_url + ")\n" +
                      "[Steam 글로벌 버전](" + $autopatch_page_url + ") | [BiliBili PC 버전](" + $autopatch_page_url + ")\n" +
                      "-# 프로그램이 설치된 상태에서만 사용 가능합니다."
                    )
                  },
                  {
                    name: "정보",
                    value: (
                      "[작업 상태](" + $workflow_tree_url + ") | " +
                      "[릴리즈 정보](" + $release_url + ") | " +
                      "[변경 내용](" + $changelog_url + ")"
                    )
                  }
                ],
                timestamp: $timestamp
              }
            ],
            attachments: []
          }')"

        if ! curl -sS -X POST "${DISCORD_WEBHOOK}" -H "Content-Type: application/json" -d "${PAYLOAD}" >/dev/null; then
          echo "::warning::Failed to send Discord webhook notification."
        fi
