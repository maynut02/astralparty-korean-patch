name: Data Sync

on:
  # schedule:
  #   - cron: "0/10 * * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Game version"
        required: false
        default: "3.1.0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  actions: write

jobs:
  plan-shards:
    name: Plan Shards
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      version: ${{ steps.plan.outputs.version }}
      route_meta: ${{ steps.plan.outputs.route_meta }}
      has_changes: ${{ steps.plan.outputs.has_changes }}
      int_steam_changed: ${{ steps.plan.outputs.int_steam_changed }}
    env:
      VERSION: ${{ github.event.inputs.version }}
      ROUTES: "INT_STEAM,INT_ANDROID,CN_BILIBILI"
      PER_SHARD: "500"
      MAX_SHARDS: "20"

    steps:
      - name: Checkout repository (main branch)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Load previous workflow snapshot
        run: |
          set -euo pipefail
          mkdir -p state
          if git ls-remote --exit-code --heads origin workflow >/dev/null 2>&1; then
            git fetch origin workflow --depth=1
            git show origin/workflow:state/get_report.json > state/prev_get_report.json || true
          fi

      - name: Build shard matrix
        id: plan
        run: |
          astral-workflow plan-get-shards \
            --version "${VERSION}" \
            --routes "${ROUTES}" \
            --per-shard "${PER_SHARD}" \
            --max-shards "${MAX_SHARDS}" \
            --previous-snapshot "state/prev_get_report.json" \
            --check-output "state/get_check.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Upload check artifact
        uses: actions/upload-artifact@v6
        with:
          name: get-check
          path: state/get_check.json
          retention-days: 1
          if-no-files-found: error

  downloads:
    name: download ${{ matrix.route }} [${{ matrix.shard_no }}/${{ matrix.shard_count }}]
    if: ${{ needs.plan-shards.outputs.has_changes == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [plan-shards]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-shards.outputs.matrix) }}
      max-parallel: 20
    env:
      VERSION: ${{ needs.plan-shards.outputs.version }}

    steps:
      - name: Checkout repository (main branch)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run assets-get shard
        run: |
          astral-patch get \
            --version "${VERSION}" \
            --route "${{ matrix.route }}" \
            --shard-count "${{ matrix.shard_count }}" \
            --shard-index "${{ matrix.shard_index }}" \
            --snapshot-file "state/get_report.${{ matrix.route }}.${{ matrix.shard_index }}.json"

      - name: Prepare shard artifact
        run: |
          set -euo pipefail

          SNAPSHOT_FILE="state/get_report.${{ matrix.route }}.${{ matrix.shard_index }}.json"

          mkdir -p _artifact/route_output _artifact/state _artifact/reports
          rsync -a "output_get/${{ matrix.route }}/" "_artifact/route_output/${{ matrix.route }}/"
          cp "${SNAPSHOT_FILE}" "_artifact/state/"

          astral-workflow extract-shard-report \
            --snapshot-file "${SNAPSHOT_FILE}" \
            --route "${{ matrix.route }}" \
            --output-file "_artifact/reports/report.${{ matrix.route }}.${{ matrix.shard_index }}.json"

      - name: Upload shard artifact
        uses: actions/upload-artifact@v6
        with:
          name: get-${{ matrix.route }}-${{ matrix.shard_index }}
          path: _artifact/
          retention-days: 1
          if-no-files-found: error

  aggregate:
    name: Aggregate
    if: ${{ needs.plan-shards.outputs.has_changes == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [plan-shards, downloads]
    env:
      VERSION: ${{ needs.plan-shards.outputs.version }}

    steps:
      - name: Checkout repository (main branch)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Download all shard artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: get-*
          merge-multiple: true
          path: _incoming

      - name: Restore previous workflow baseline
        run: |
          set -euo pipefail
          rm -rf output_get state _previous
          mkdir -p output_get state

          if git ls-remote --exit-code --heads origin workflow >/dev/null 2>&1; then
            git fetch origin workflow --depth=1
            git worktree add --force --detach _previous origin/workflow

            if [ -d _previous/output_get ]; then
              rsync -a _previous/output_get/ output_get/
            fi
            if [ -f _previous/state/get_report.json ]; then
              cp _previous/state/get_report.json state/base_get_report.json
            fi

            git worktree remove _previous --force
          fi

      - name: Rebuild output_get/state from artifacts
        run: |
          set -euo pipefail
          rsync -a _incoming/route_output/ output_get/

          astral-workflow merge-get-snapshots \
            --input-dir _incoming/state \
            --output-file state/get_report.json \
            --version "${VERSION}" \
            --base-file state/base_get_report.json

          astral-workflow merge-get-reports \
            --reports-dir _incoming/reports \
            --output-root output_get

      - name: Upload aggregated base data
        uses: actions/upload-artifact@v6
        with:
          name: base-data
          path: |
            output_get/
            state/get_report.json
          retention-days: 1
          if-no-files-found: error

  syncs:
    name: ${{ matrix.label }}
    if: ${{ needs.plan-shards.outputs.has_changes == 'true' && needs.plan-shards.outputs.int_steam_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [plan-shards, aggregate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Lang Sync
            command: astral-patch lang
            report_path: state/lang_report.json
            artifact_name: lang-report
          - label: STR Sync
            command: astral-patch str
            report_path: state/str_report.json
            artifact_name: str-report
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository (main branch)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Download aggregated base data
        uses: actions/download-artifact@v5
        with:
          name: base-data
          path: _incoming/base

      - name: Restore output_get/state
        run: |
          set -euo pipefail
          rm -rf output_get state
          mkdir -p output_get state
          rsync -a _incoming/base/output_get/ output_get/
          cp _incoming/base/state/get_report.json state/get_report.json

      - name: Run STR job
        run: ${{ matrix.command }}

      - name: Upload STR report artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.report_path }}
          retention-days: 1
          if-no-files-found: error

  finalize:
    name: Commit workflow branch
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [plan-shards, aggregate, syncs]
    if: ${{ always() && needs.plan-shards.result == 'success' && (needs.aggregate.result == 'success' || needs.aggregate.result == 'skipped') && (needs.syncs.result == 'success' || needs.syncs.result == 'skipped') }}

    steps:
      - name: Checkout repository (main branch)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Download check artifact
        uses: actions/download-artifact@v5
        with:
          name: get-check
          path: _incoming/check

      - name: Download aggregated base data
        if: ${{ needs.plan-shards.outputs.has_changes == 'true' }}
        uses: actions/download-artifact@v5
        with:
          name: base-data
          path: _incoming/base

      - name: Download STR reports
        if: ${{ needs.plan-shards.outputs.has_changes == 'true' && needs.plan-shards.outputs.int_steam_changed == 'true' }}
        uses: actions/download-artifact@v5
        with:
          pattern: "*-report"
          merge-multiple: true
          path: _incoming/reports

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Prepare workflow data worktree
        run: |
          set -euo pipefail

          rm -rf .workflow-data _wf_prev
          mkdir -p _wf_prev

          if git ls-remote --exit-code --heads origin workflow >/dev/null 2>&1; then
            git fetch origin workflow
            git worktree add --force .workflow-data origin/workflow
          else
            git worktree add --force -b workflow .workflow-data HEAD
          fi

          if [ -d .workflow-data/output_get ]; then
            mkdir -p _wf_prev/output_get
            rsync -a .workflow-data/output_get/ _wf_prev/output_get/
          fi
          if [ -d .workflow-data/state ]; then
            mkdir -p _wf_prev/state
            rsync -a .workflow-data/state/ _wf_prev/state/
          fi
          if [ -f .workflow-data/README.md ]; then
            cp .workflow-data/README.md _wf_prev/README.md
          fi

          find .workflow-data -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          mkdir -p .workflow-data/output_get .workflow-data/state

          if [ -d _wf_prev/output_get ]; then
            rsync -a _wf_prev/output_get/ .workflow-data/output_get/
          fi
          if [ -d _wf_prev/state ]; then
            rsync -a _wf_prev/state/ .workflow-data/state/
          fi
          if [ -f _wf_prev/README.md ]; then
            cp _wf_prev/README.md .workflow-data/README.md
          fi

      - name: Rebuild workflow data
        run: |
          set -euo pipefail

          cp _incoming/check/get_check.json .workflow-data/state/get_check.json

          if [ "${{ needs.plan-shards.outputs.has_changes }}" = "true" ]; then
            rm -rf .workflow-data/output_get
            mkdir -p .workflow-data/output_get
            rsync -a _incoming/base/output_get/ .workflow-data/output_get/
            cp _incoming/base/state/get_report.json .workflow-data/state/get_report.json

            if [ "${{ needs.plan-shards.outputs.int_steam_changed }}" = "true" ]; then
              cp .workflow-data/state/get_report.json .workflow-data/state/last_str_sync_report.json
            fi
          fi

          if [ -f _incoming/reports/lang_report.json ]; then
            cp _incoming/reports/lang_report.json .workflow-data/state/lang_report.json
          fi
          if [ -f _incoming/reports/str_report.json ]; then
            cp _incoming/reports/str_report.json .workflow-data/state/str_report.json
          fi

      - name: Prune output_get history (keep 5 per route)
        run: astral-workflow prune-output-get .workflow-data/output_get --keep 5

      - name: Update README run summary
        run: astral-workflow update-workflow-readme --workflow-root .workflow-data

      - name: Validate workflow branch layout
        run: astral-workflow validate-workflow-layout --workflow-root .workflow-data

      - name: Commit and push workflow branch
        run: |
          set -euo pipefail

          COMMIT_MSG="$(astral-workflow build-sync-commit-message --snapshot-file .workflow-data/state/get_report.json)"

          cd .workflow-data

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A .

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "$COMMIT_MSG"
          git push origin HEAD:workflow

      - name: Delete run artifacts
        if: ${{ success() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          astral-workflow delete-run-artifacts \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}"

  patch-prerelease:
    name: Patch (pre-release)
    if: ${{ needs.aggregate.result == 'success' && needs.finalize.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [plan-shards, aggregate, finalize]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code (main branch)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - name: Checkout data branch (workflow)
        uses: actions/checkout@v5
        with:
          ref: workflow
          path: workflow-data
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Restore output_get/state from workflow branch
        run: |
          set -euo pipefail
          rm -rf output_get state
          mkdir -p output_get state
          rsync -a workflow-data/output_get/ output_get/
          rsync -a workflow-data/state/ state/

      - name: Run assets-patch
        run: |
          set -euo pipefail
          astral-patch patch

      - name: Upload patched data artifact
        uses: actions/upload-artifact@v6
        with:
          name: patched-output-pre
          path: |
            output_patch/
            state/get_report.json
          retention-days: 1
          if-no-files-found: error

  build-prerelease:
    name: Build and Upload (pre-release)
    if: ${{ needs.patch-prerelease.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [patch-prerelease]

    steps:
      - name: Checkout code (main branch)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Download patched data artifact
        uses: actions/download-artifact@v5
        with:
          name: patched-output-pre
          path: _incoming/patched

      - name: Restore output_patch/state
        run: |
          set -euo pipefail
          rm -rf output_patch state
          mkdir -p output_patch state
          rsync -a _incoming/patched/output_patch/ output_patch/
          cp _incoming/patched/state/get_report.json state/get_report.json

      - name: Build pre-release zip files
        run: |
          set -euo pipefail
          astral-workflow build-patch-zips \
            --snapshot-file state/get_report.json \
            --output-root output_patch \
            --zip-dir release_zips \
            --file-suffix=-pre

      - name: Prepare release metadata
        id: release_meta
        run: |
          set -euo pipefail
          astral-workflow build-release-meta \
            --snapshot-file state/get_report.json \
            --tag-suffix=-pre \
            --github-output "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release (pre)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release_meta.outputs.tag }}"
          TITLE="${{ steps.release_meta.outputs.title }}"
          NOTES_FILE="release_notes.txt"

          cat > "${NOTES_FILE}" <<'EOF'
          ${{ steps.release_meta.outputs.body }}
          EOF

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release_zips/*.zip --clobber
            gh release edit "${TAG}" --title "${TITLE}" --notes-file "${NOTES_FILE}" --target main
          else
            gh release create "${TAG}" release_zips/*.zip --title "${TITLE}" --notes-file "${NOTES_FILE}" --target main
          fi

          RELEASE_ID="$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.id')"
          gh api --method PATCH "repos/${REPO}/releases/${RELEASE_ID}" -F prerelease=false -F draft=false >/dev/null

      - name: Notify Discord (pre)
        if: ${{ success() }}
        uses: ./.github/actions/notify-discord-release
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          tag: ${{ steps.release_meta.outputs.tag }}

      - name: Delete run artifacts
        if: ${{ success() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          astral-workflow delete-run-artifacts \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}"
